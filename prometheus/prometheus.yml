global:
  scrape_interval: 10s
  evaluation_interval: 10s
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: [ 'prometheus:9090' ]
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'api-gateway:9191' ]
  - job_name: 'ai-recommendation-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'ai-recommendation-service:8082' ]
  - job_name: 'analitics-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'analitics-service:8083' ]
  - job_name: 'config-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'config-server:88888' ]
  - job_name: 'habit-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'habit-service:8081' ]
  - job_name: 'notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'notification-service:8084' ]
  - job_name: 'prime-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'prime-service:8085' ]
  - job_name: 'user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'user-service:8080' ]