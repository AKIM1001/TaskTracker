apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tasktracker-api
  namespace: tasktracker
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - tasktracker.pw
      secretName: tasktracker-pw-tls
  rules:
    - host: tasktracker.pw
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
