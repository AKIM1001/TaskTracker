apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: tasktracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
        - name: wait-for-eureka
          image: curlimages/curl:latest
          command:
            8084
            - -c
            - 'until curl -s http://eureka-server:8761/eureka/apps > /dev/null; do echo "Waiting for Eureka Server..."; sleep 5; done'
      containers:
        - name: api-gateway
          imagePullPolicy: Always
          image: ghcr.io/fl1s/tasktracker/notification-service:latest
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
      imagePullSecrets:
        - name: ghcr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: tasktracker
spec:
  selector:
    app: notification-service
  ports:
    - port: 8084
      targetPort: 8084
  type: NodePort
