apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: tasktracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      initContainers:
        - name: wait-for-eureka
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - 'until curl -s http://eureka-server:8761/eureka/apps > /dev/null; do echo "Waiting for Eureka Server..."; sleep 5; done'
      containers:
        - name: config-server
          imagePullPolicy: Always
          image: ghcr.io/fl1s/tasktracker/config-server:latest
          ports:
            - containerPort: 8888
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
      imagePullSecrets:
        - name: ghcr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: tasktracker
spec:
  selector:
    app: config-server
  ports:
    - port: 8888
      targetPort: 8888
  type: NodePort
